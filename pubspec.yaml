name: freelancer_project
description: "BMIT2073 Mobile Application Development"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Local persistence (replaces Firebase for this build)
  sqflite: ^2.3.3+1
  path: ^1.9.1
  shared_preferences: ^2.3.4

  # File & media
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  path_provider: ^2.1.4

  # Advanced features
  signature: ^5.5.0          # Milestone digital signature pad
  fl_chart: ^0.69.0           # Earnings bar chart + rating pie chart
  share_plus: ^10.1.4         # Native social sharing
  record: ^6.0.0              # Voice pitch recording
  audioplayers: ^6.4.0        # Voice pitch playback
  flutter_stripe: ^11.4.0     # Payment gateway simulation

  # Connectivity & networking
  connectivity_plus: ^6.1.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  crypto: ^3.0.3
  permission_handler: ^11.4.0

  # Firebase (disabled — kept for future activation)
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.7
  firebase_auth: ^5.5.3
  firebase_storage: ^12.4.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
