name: freelancer_project
description: "BMIT2073 Mobile Application Development"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Cloud backend
  supabase_flutter: ^2.8.4

  # Local persistence (offline cache only)
  sqflite: ^2.3.3+1
  path: ^1.9.1

  # File & media
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  path_provider: ^2.1.4

  # Advanced features
  signature: ^5.5.0          # Milestone digital signature pad
  fl_chart: ^0.69.0           # Earnings bar chart + rating pie chart
  share_plus: ^10.1.4         # Native social sharing
  record: ^6.0.0              # Voice pitch recording
  audioplayers: ^6.4.0        # Voice pitch playback
  flutter_stripe: ^11.4.0     # Payment gateway simulation

  # Connectivity & networking
  connectivity_plus: ^6.1.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
